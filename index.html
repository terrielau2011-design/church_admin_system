<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教會行政管理系統 v2.0.0</title>
<style>
/* ===== Tailwind-lite Reset & Utility ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#f8fafc;--c-surface:#fff;--c-border:#e2e8f0;--c-text:#1e293b;
  --c-muted:#64748b;--c-primary:#6366f1;--c-primary-hover:#4f46e5;
  --c-success:#10b981;--c-warning:#f59e0b;--c-danger:#ef4444;
  --c-info:#3b82f6;--c-shepherd:#8b5cf6;--c-admin:#f97316;--c-grow:#06b6d4;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.6;min-height:100vh}
.flex{display:flex}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.justify-center{justify-content:center}.gap-1{gap:.25rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.gap-6{gap:1.5rem}
.grid{display:grid}.grid-cols-2{grid-template-columns:repeat(2,1fr)}.grid-cols-3{grid-template-columns:repeat(3,1fr)}.grid-cols-4{grid-template-columns:repeat(4,1fr)}
.grid-cols-5{grid-template-columns:repeat(5,1fr)}
.p-1{padding:.25rem}.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-6{padding:1.5rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}
.mb-1{margin-bottom:.25rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-6{margin-bottom:1.5rem}
.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mr-2{margin-right:.5rem}.ml-2{margin-left:.5rem}
.text-xs{font-size:.75rem}.text-sm{font-size:.875rem}.text-lg{font-size:1.125rem}.text-xl{font-size:1.25rem}.text-2xl{font-size:1.5rem}.text-3xl{font-size:1.875rem}
.font-bold{font-weight:700}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.text-center{text-align:center}.text-right{text-align:right}
.text-muted{color:var(--c-muted)}.text-primary{color:var(--c-primary)}
.text-success{color:var(--c-success)}.text-danger{color:var(--c-danger)}.text-warning{color:var(--c-warning)}
.card{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem}
.card-header{border-bottom:1px solid var(--c-border);padding-bottom:.75rem;margin-bottom:1rem}
.btn{padding:.5rem 1rem;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:.375rem}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-success{background:var(--c-success);color:#fff}
.btn-danger{background:var(--c-danger);color:#fff}
.btn-warning{background:var(--c-warning);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--c-border);color:var(--c-text)}
.btn-outline:hover{background:var(--c-bg)}
.btn-sm{padding:.3rem .65rem;font-size:.8rem}
.btn-lg{padding:.65rem 1.5rem;font-size:1rem}
.btn-block{width:100%;justify-content:center}
.badge{display:inline-block;padding:.15rem .55rem;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-muted{background:#f1f5f9;color:var(--c-muted)}
.badge-shepherd{background:#ede9fe;color:#6d28d9}
.badge-admin-task{background:#fff7ed;color:#c2410c}
.badge-grow{background:#ecfeff;color:#0e7490}
.input{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;transition:border .15s}
.input:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.select{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;background:var(--c-surface);cursor:pointer}
.textarea{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;resize:vertical;min-height:70px}
.label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.25rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:.03em}
.container{max-width:1280px;margin:0 auto;padding:0 1rem}
.topbar{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:.75rem 1.5rem;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.content{padding:1.5rem}
.tab-nav{display:flex;gap:.25rem;border-bottom:2px solid var(--c-border);margin-bottom:1.5rem;flex-wrap:wrap}
.tab-btn{padding:.6rem 1rem;border:none;background:transparent;cursor:pointer;font-size:.875rem;font-weight:500;color:var(--c-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--c-text)}
.tab-btn.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:.65rem .75rem;text-align:left;border-bottom:1px solid var(--c-border);font-size:.875rem}
.table th{font-weight:600;color:var(--c-muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.03em}
.table tbody tr:hover{background:#f8fafc}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .15s}
.modal{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:1.5rem;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calendar-header{text-align:center;font-size:.75rem;font-weight:600;color:var(--c-muted);padding:.4rem 0}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .12s;position:relative}
.calendar-day:hover{background:#eef2ff}
.calendar-day.today{background:var(--c-primary);color:#fff;font-weight:700}
.calendar-day.has-event::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--c-primary)}
.calendar-day.today.has-event::after{background:#fff}
.calendar-day.other-month{color:#cbd5e1}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:200;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1.25rem;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-size:.875rem;animation:slideIn .25s;display:flex;align-items:center;gap:.5rem}
.toast-success{background:#d1fae5;color:#065f46}
.toast-error{background:#fee2e2;color:#991b1b}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.stat-card{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem 1.25rem;text-align:center}
.stat-value{font-size:2rem;font-weight:700;color:var(--c-primary)}
.stat-label{font-size:.75rem;color:var(--c-muted);margin-top:.15rem}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.login-card{background:var(--c-surface);border-radius:16px;box-shadow:var(--shadow-lg);padding:2.5rem;width:90%;max-width:420px;text-align:center}
.avatar-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;color:#fff}
.avatar-staff{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.avatar-admin{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--c-success);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hidden{display:none !important}
.progress-bar{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-success{background:var(--c-success)}
.progress-warning{background:var(--c-warning)}
.progress-danger{background:var(--c-danger)}
.section-title{font-size:1rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.filter-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.event-item{padding:.6rem .75rem;background:var(--c-bg);border-radius:8px;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem;font-size:.85rem;cursor:pointer;transition:all .12s}
.event-item:hover{background:#eef2ff}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-dot.meeting{background:var(--c-primary)}
.event-dot.activity{background:var(--c-success)}
.event-dot.personal{background:var(--c-warning)}
/* Ministry category badges inline */
.cat-shepherd{color:var(--c-shepherd);font-weight:600}
.cat-admin{color:var(--c-admin);font-weight:600}
.cat-grow{color:var(--c-grow);font-weight:600}
/* Health alert banner */
.health-alert{padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;font-size:.875rem}
.health-alert.warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.health-alert.good{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
/* SVG Chart container */
.chart-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
.chart-legend{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-top:.75rem;font-size:.8rem}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block;flex-shrink:0}
/* Bar chart */
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.bar-label{width:100px;font-size:.8rem;text-align:right;flex-shrink:0;color:var(--c-muted)}
.bar-track{flex:1;height:24px;background:var(--c-bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;display:flex;align-items:center;padding-left:.5rem;font-size:.75rem;color:#fff;font-weight:600}
/* Mini stat row */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
.mini-stat{text-align:center;padding:.5rem;background:var(--c-bg);border-radius:8px}
.mini-stat .val{font-size:1.25rem;font-weight:700}
.mini-stat .lbl{font-size:.7rem;color:var(--c-muted)}
/* Radio group for ministry category */
.radio-group{display:flex;gap:.5rem;flex-wrap:wrap}
.radio-card{flex:1;min-width:100px;padding:.5rem .75rem;border:2px solid var(--c-border);border-radius:8px;cursor:pointer;text-align:center;font-size:.8rem;transition:all .15s}
.radio-card:hover{border-color:var(--c-primary)}
.radio-card.selected{border-color:var(--c-primary);background:#eef2ff}
.radio-card input{display:none}
</style>
</head>

<script>
/* ================================================================
   教會行政管理系統 v2.0.0 — 事工焦點量化 + BI 分析 + 日曆同步
   純離線 · IndexedDB v2 · SVG 圖表 · 跨分頁同步
   ================================================================ */

// ─── 全域狀態 ───
const APP = {
  currentRole: null,
  currentUser: null,
  currentTab: 'calendar',
  db: null,
  // BI filter state
  biPeriod: 'month',   // 'month' | 'quarter' | 'year'
  biActivityId: null
};

// ─── 常數 ───
const MINISTRY_CATEGORIES = {
  shepherd: { label: '🐑 牧養工作（給予）', color: 'var(--c-shepherd)', cls: 'cat-shepherd', examples: '關顧/面談/探訪/主日學/講道/團契/查經祈禱會' },
  admin:    { label: '📋 非牧養工作（消耗）', color: 'var(--c-admin)', cls: 'cat-admin', examples: '會議/行政/物資籌備' },
  grow:     { label: '📚 進修與充實（吸收）', color: 'var(--c-grow)', cls: 'cat-grow', examples: '課程進修/退修會' }
};

// ─── IndexedDB v2 ───
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('ChurchAdminDB', 2);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const oldVersion = e.oldVersion;

      if (oldVersion < 1) {
        if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('events')) {
          const es = db.createObjectStore('events', { keyPath: 'id', autoIncrement: true });
          es.createIndex('userId', 'userId', { unique: false });
          es.createIndex('date', 'date', { unique: false });
        }
        if (!db.objectStoreNames.contains('leaveRequests')) {
          const ls = db.createObjectStore('leaveRequests', { keyPath: 'id', autoIncrement: true });
          ls.createIndex('userId', 'userId', { unique: false });
          ls.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('expenseRequests')) {
          const es2 = db.createObjectStore('expenseRequests', { keyPath: 'id', autoIncrement: true });
          es2.createIndex('userId', 'userId', { unique: false });
          es2.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('activities')) {
          db.createObjectStore('activities', { keyPath: 'id', autoIncrement: true });
        }
      }

      if (oldVersion < 2) {
        // v2: 為 events 加入 activityId index
        if (db.objectStoreNames.contains('events')) {
          const tx = e.target.transaction;
          const es = tx.objectStore('events');
          if (!es.indexNames.contains('activityId')) {
            es.createIndex('activityId', 'activityId', { unique: false });
          }
        }
        // v2: 為 expenseRequests 加入 activityId index
        if (db.objectStoreNames.contains('expenseRequests')) {
          const tx2 = e.target.transaction;
          const es2 = tx2.objectStore('expenseRequests');
          if (!es2.indexNames.contains('activityId')) {
            es2.createIndex('activityId', 'activityId', { unique: false });
          }
        }
      }
    };
    req.onsuccess = (e) => {
      APP.db = e.target.result;
      resolve(APP.db);
    };
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const index = store.index(indexName);
    const req = index.getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ─── 種子數據 v2 ───
const SEED_USERS = [
  { id: 'u1', name: '陳牧師', role: 'staff', annualLeave: 14, compLeave: 0, sickLeave: 30 },
  { id: 'u2', name: '李傳道', role: 'staff', annualLeave: 12, compLeave: 2, sickLeave: 30 },
  { id: 'u3', name: '王傳道', role: 'staff', annualLeave: 10, compLeave: 0, sickLeave: 30 },
  { id: 'u4', name: '張姑娘', role: 'staff', annualLeave: 14, compLeave: 3, sickLeave: 30 },
  { id: 'admin1', name: '行政主任', role: 'admin', annualLeave: 18, compLeave: 0, sickLeave: 30 }
];

async function seedData() {
  const users = await dbGetAll('users');
  if (users.length === 0) {
    for (const u of SEED_USERS) await dbPut('users', u);
    // 活動
    await dbPut('activities', { id: 1, name: '2026夏季佈道會', date: '2026-07-15', budget: 50000, status: 'planned' });
    await dbPut('activities', { id: 2, name: '2026培靈會', date: '2026-09-20', budget: 30000, status: 'planned' });
    await dbPut('activities', { id: 3, name: '聖誕節晚會', date: '2026-12-24', budget: 20000, status: 'planned' });
    // 請假
    await dbPut('leaveRequests', { id: 1, userId: 'u1', type: 'annual', startDate: '2026-06-15', endDate: '2026-06-17', reason: '家庭旅行', status: 'pending', createdAt: Date.now() });
    await dbPut('leaveRequests', { id: 2, userId: 'u2', type: 'sick', startDate: '2026-06-10', endDate: '2026-06-10', reason: '身體不適', status: 'approved', createdAt: Date.now() - 86400000 });
    // 報銷 (v2: 加入 activityId)
    await dbPut('expenseRequests', { id: 1, userId: 'u1', category: 'travel', amount: 1500, description: '探訪會友交通費', status: 'pending', activityId: null, createdAt: Date.now() });
    await dbPut('expenseRequests', { id: 2, userId: 'u3', category: 'stationery', amount: 320, description: '主日學教材印刷', status: 'approved', activityId: null, createdAt: Date.now() - 172800000 });
    // 日程 (v2: 加入 ministryCategory, hours, activityId)
    await dbPut('events', { id: 1, userId: 'u1', title: '主日崇拜講道', date: '2026-06-14', type: 'meeting', time: '10:00', ministryCategory: 'shepherd', hours: 4, activityId: null });
    await dbPut('events', { id: 2, userId: 'u1', title: '同工行政會議', date: '2026-06-16', type: 'meeting', time: '14:30', ministryCategory: 'admin', hours: 2, activityId: null });
    await dbPut('events', { id: 3, userId: 'u1', title: '探訪陳弟兄', date: '2026-06-18', type: 'activity', time: '15:00', ministryCategory: 'shepherd', hours: 2, activityId: null });
    await dbPut('events', { id: 4, userId: 'u1', title: '神學進修課程', date: '2026-06-20', type: 'personal', time: '09:00', ministryCategory: 'grow', hours: 6, activityId: null });

// ─── 日程月曆 (v2 升級：三維度分類 + 活動綁定 + ICS 匯出) ───
function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayHeaders = ['日','一','二','三','四','五','六'];

  let calHTML = '<div class="calendar-grid">';
  dayHeaders.forEach(d => { calHTML += `<div class="calendar-header">${d}</div>`; });
  for (let i = 0; i < firstDay; i++) calHTML += '<div class="calendar-day other-month"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === now.getDate();
    const cls = ['calendar-day'];
    if (isToday) cls.push('today');
    calHTML += `<div class="${cls.join(' ')}" data-date="${dateStr}" onclick="showDayEvents('${dateStr}')">${d}</div>`;
  }
  calHTML += '</div>';

  document.getElementById('staffTabContent').innerHTML = `
    <div class="grid grid-cols-3 gap-4">
      <div class="card" style="grid-column:span 2">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold">${year}年 ${monthNames[month]}</h3>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="exportICS()">📥 導出日曆 (.ics)</button>
            <button class="btn btn-primary btn-sm" onclick="openEventModal()">＋ 新增事件</button>
          </div>
        </div>
        ${calHTML}
        <div class="flex gap-4 mt-4 text-xs text-muted">
          <span>🐑 牧養</span><span>📋 非牧養</span><span>📚 進修</span>
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">📋 今日日程</h3>
        <div id="todayEvents"><p class="text-muted text-sm">載入中...</p></div>
        <hr style="border:none;border-top:1px solid var(--c-border);margin:1rem 0">
        <h3 class="section-title">📌 本月事件</h3>
        <div id="monthEvents"><p class="text-muted text-sm">載入中...</p></div>
      </div>
    </div>
  `;
  loadCalendarEvents(year, month);
}

async function loadCalendarEvents(year, month) {
  const events = await dbGetByIndex('events', 'userId', APP.currentUser.id);
  const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthEvents = events.filter(e => e.date.startsWith(monthPrefix));

  const eventDates = new Set(monthEvents.map(e => e.date));
  document.querySelectorAll('.calendar-day[data-date]').forEach(el => {
    if (eventDates.has(el.dataset.date)) el.classList.add('has-event');
  });

  const today = `${year}-${String(month+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  const todayEvents = events.filter(e => e.date === today);
  const todayEl = document.getElementById('todayEvents');
  if (todayEvents.length === 0) {
    todayEl.innerHTML = '<p class="text-muted text-sm">今日暫無安排</p>';
  } else {
    todayEl.innerHTML = todayEvents.map(e => {
      const cat = MINISTRY_CATEGORIES[e.ministryCategory];
      return `<div class="event-item" onclick="editEvent(${e.id})">
        <span class="event-dot ${e.type || 'meeting'}"></span>
        <span style="flex:1">${e.title}</span>
        <span class="text-xs ${cat ? cat.cls : ''}">${cat ? cat.label.slice(0,4) : ''} ${e.hours||0}h</span>
      </div>`;
    }).join('');
  }

  const monthEl = document.getElementById('monthEvents');
  if (monthEvents.length === 0) {
    monthEl.innerHTML = '<p class="text-muted text-sm">本月暫無事件</p>';
  } else {
    monthEl.innerHTML = monthEvents.sort((a,b) => a.date.localeCompare(b.date)).map(e => {
      const cat = MINISTRY_CATEGORIES[e.ministryCategory];
      return `<div class="event-item" onclick="editEvent(${e.id})">
        <span class="event-dot ${e.type || 'meeting'}"></span>
        <span style="flex:1">${e.title}</span>
        <span class="text-xs text-muted">${e.date.slice(5)} ${cat ? cat.label.slice(0,4) : ''}</span>
      </div>`;
    }).join('');
  }
}

async function showDayEvents(dateStr) {

// ─── ICS 匯出 ───
async function exportICS() {
  const events = await dbGetByIndex('events', 'userId', APP.currentUser.id);
  if (events.length === 0) { showToast('沒有可匯出的事件', 'error'); return; }
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//ChurchAdmin//CN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
  events.forEach(e => {
    const dtStart = e.date.replace(/-/g,'') + 'T' + (e.time||'000000').replace(/:/g,'') + '00';
    const dtEnd = e.date.replace(/-/g,'') + 'T' + (e.time||'000000').replace(/:/g,'') + '00'; // 簡化：無自動計算結束
    const cat = MINISTRY_CATEGORIES[e.ministryCategory];
    const summary = `[${cat ? cat.label.slice(0,4) : ''}] ${e.title}`;
    ics += 'BEGIN:VEVENT\r\n';
    ics += `DTSTART:${dtStart}\r\n`;
    ics += `DTEND:${dtEnd}\r\n`;
    ics += `SUMMARY:${summary}\r\n`;
    ics += `DESCRIPTION:工時 ${e.hours||0}h | 分類 ${e.ministryCategory||''}\r\n`;
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `church-calendar-${APP.currentUser.name}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 日曆已導出，可匯入 Outlook/Google/Apple Calendar', 'success');
}

async function renderLeave() {
  const user = APP.currentUser;
  const leaves = await dbGetByIndex('leaveRequests', 'userId', user.id);
  const approved = leaves.filter(l => l.status === 'approved');
  let usedAnnual = 0, usedComp = 0;
  approved.forEach(l => {
    const days = daysBetween(l.startDate, l.endDate);
    if (l.type === 'annual') usedAnnual += days;
    else if (l.type === 'comp') usedComp += days;
  });
  const remainAnnual = Math.max(0, (user.annualLeave || 0) - usedAnnual);
  const remainComp = Math.max(0, (user.compLeave || 0) - usedComp);
  const remainSick = Math.max(0, (user.sickLeave || 30));

  document.getElementById('staffTabContent').innerHTML = `
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="stat-card"><div class="stat-value">${remainAnnual}</div><div class="stat-label">剩餘年假 (共${user.annualLeave||0}天)</div><div class="progress-bar mt-2"><div class="progress-fill progress-${remainAnnual>3?'success':'warning'}" style="width:${(remainAnnual/(user.annualLeave||14))*100}%"></div></div></div>
      <div class="stat-card"><div class="stat-value">${remainComp}</div><div class="stat-label">剩餘補假 (共${user.compLeave||0}天)</div></div>
      <div class="stat-card"><div class="stat-value">${remainSick}</div><div class="stat-label">剩餘病假</div></div>
      <div class="stat-card"><div class="stat-value">${leaves.filter(l=>l.status==='pending').length}</div><div class="stat-label">待審批申請</div></div>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div class="card" style="grid-column:span 2"><h3 class="section-title">📋 請假記錄</h3><div id="leaveList">${renderLeaveList(leaves)}</div></div>
      <div class="card"><h3 class="section-title">✍️ 申請假期</h3>
        <form onsubmit="submitLeave(event)" style="display:flex;flex-direction:column;gap:.75rem">
          <div><label class="label">假期類型</label><select class="select" id="leaveType" required><option value="annual">年假</option><option value="comp">補假</option><option value="sick">病假</option><option value="other">其他</option></select></div>
          <div class="grid grid-cols-2 gap-3"><div><label class="label">開始日期</label><input class="input" type="date" id="leaveStart" required></div><div><label class="label">結束日期</label><input class="input" type="date" id="leaveEnd" required></div></div>
          <div><label class="label">原因</label><textarea class="textarea" id="leaveReason" placeholder="請簡述請假原因..."></textarea></div>
          <button class="btn btn-primary btn-block" type="submit">📤 提交申請</button>
        </form>
      </div>
    </div>
  `;
}

function renderLeaveList(leaves) {
  if (leaves.length === 0) return '<p class="text-muted text-sm">暫無請假記錄</p>';
  const typeLabels = { annual:'年假', comp:'補假', sick:'病假', other:'其他' };
  const statusLabels = { pending:['待審批','warning'], approved:['已批准','success'], rejected:['已拒絕','danger'] };
  return `<table class="table"><thead><tr><th>類型</th><th>日期</th><th>天數</th><th>原因</th><th>狀態</th></tr></thead>
    <tbody>${leaves.sort((a,b)=>b.createdAt-a.createdAt).map(l => `
      <tr><td>${typeLabels[l.type]||l.type}</td><td>${l.startDate} 至 ${l.endDate}</td><td>${daysBetween(l.startDate,l.endDate)}天</td><td>${escapeHtml(l.reason||'')}</td><td><span class="badge badge-${statusLabels[l.status][1]}">${statusLabels[l.status][0]}</span></td></tr>
    `).join('')}</tbody></table>`;
}

async function submitLeave(e) {
  e.preventDefault();
  const type = document.getElementById('leaveType').value;
  const startDate = document.getElementById('leaveStart').value;
  const endDate = document.getElementById('leaveEnd').value;
  const reason = document.getElementById('leaveReason').value.trim();
  if (!startDate || !endDate) { showToast('請選擇日期', 'error'); return; }
  if (startDate > endDate) { showToast('結束日期不可早於開始日期', 'error'); return; }
  await dbPut('leaveRequests', { userId: APP.currentUser.id, type, startDate, endDate, reason, status: 'pending', createdAt: Date.now() });
  loadStaffData();
  showToast('假期申請已提交 ✓', 'success');
}

// ─── 員工 BI 分析 (v2 新增) ───
async function renderStaffAnalytics() {
  const [events, activities] = await Promise.all([
    dbGetByIndex('events', 'userId', APP.currentUser.id),
    dbGetAll('activities')
  ]);
  const actMap = {}; activities.forEach(a => { actMap[a.id] = a.name; });

  // 週期過濾
  const now = new Date();
  let periodStart;
  if (APP.biPeriod === 'month') {
    periodStart = new Date(now.getFullYear(), now.getMonth(), 1);
  } else if (APP.biPeriod === 'quarter') {
    const q = Math.floor(now.getMonth() / 3);
    periodStart = new Date(now.getFullYear(), q * 3, 1);
  } else {
    periodStart = new Date(now.getFullYear(), 0, 1);
  }
  const periodEvents = events.filter(e => new Date(e.date) >= periodStart);

  // 三維度工時統計
  const dimHours = { shepherd: 0, admin: 0, grow: 0 };
  periodEvents.forEach(e => {
    if (dimHours.hasOwnProperty(e.ministryCategory)) {
      dimHours[e.ministryCategory] += (e.hours || 0);
    }
  });
  const totalHours = dimHours.shepherd + dimHours.admin + dimHours.grow;

  // 健康度判斷
  let healthMsg = '', healthClass = '';
  if (totalHours === 0) {
    healthMsg = '📭 本週期暫無工作記錄。請開始填寫日程以獲得健康度分析。';
    healthClass = 'warn';
  } else {
    const adminPct = dimHours.admin / totalHours;
    const growPct = dimHours.grow / totalHours;
    if (adminPct > 0.5) {
      healthMsg = '⚠️ 非牧養行政工作佔比超過 50%，請留意是否過度消耗精力，建議適度調整並增加進修時間。';
      healthClass = 'warn';
    } else if (growPct === 0 && totalHours > 10) {
      healthMsg = '💡 本週期暫無進修記錄。持續學習是服侍長遠的根基，建議安排退修或進修時間。';
      healthClass = 'warn';
    } else if (dimHours.shepherd >= dimHours.admin && growPct > 0.05) {
      healthMsg = '✅ 事工焦點分配均衡！牧養為主、行政為輔、持續進修，保持健康節奏。';
      healthClass = 'good';
    } else {
      healthMsg = '💡 事工分配大致合理，建議持續關注進修與充實的比例。';
      healthClass = 'good';
    }
  }

  const periodLabel = APP.biPeriod === 'month' ? '本月' : APP.biPeriod === 'quarter' ? '本季' : '本年';

  document.getElementById('staffTabContent').innerHTML = `
    <div class="health-alert ${healthClass}">
      <span style="font-size:1.25rem">${healthClass==='good'?'✅':'⚠️'}</span>
      <span>${healthMsg}</span>
    </div>
    <div class="filter-row mb-4">
      <span class="text-sm text-muted">分析週期：</span>
      <button class="btn btn-sm ${APP.biPeriod==='month'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='month';renderStaffAnalytics()">本月</button>
      <button class="btn btn-sm ${APP.biPeriod==='quarter'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='quarter';renderStaffAnalytics()">本季</button>
      <button class="btn btn-sm ${APP.biPeriod==='year'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='year';renderStaffAnalytics()">本年</button>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card">
        <h3 class="section-title">📊 ${periodLabel}三維度工時分佈</h3>
        <div class="mini-stats mb-4">
          <div class="mini-stat"><div class="val" style="color:var(--c-shepherd)">${dimHours.shepherd}h</div><div class="lbl">🐑 牧養工作</div></div>
          <div class="mini-stat"><div class="val" style="color:var(--c-admin)">${dimHours.admin}h</div><div class="lbl">📋 非牧養工作</div></div>
          <div class="mini-stat"><div class="val" style="color:var(--c-grow)">${dimHours.grow}h</div><div class="lbl">📚 進修與充實</div></div>
        </div>
        <div class="chart-wrap">
          ${totalHours > 0 ? renderPieChartSVG(dimHours, totalHours) : '<p class="text-muted text-sm">暫無數據</p>'}
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">📅 ${periodLabel}活動參與工時</h3>
        ${renderActivityEventBreakdown(periodEvents, actMap)}
      </div>
    </div>
    <div class="card">
      <h3 class="section-title">📋 ${periodLabel}事件明細</h3>
      ${renderEventTable(periodEvents, actMap)}
    </div>
  `;
}

function renderPieChartSVG(dimHours, totalHours) {
  const colors = { shepherd: 'var(--c-shepherd)', admin: 'var(--c-admin)', grow: 'var(--c-grow)' };
  const labels = { shepherd: '牧養工作', admin: '非牧養工作', grow: '進修與充實' };
  const slices = [];
  let cumulative = 0;
  const cx = 90, cy = 90, r = 70;

  Object.entries(dimHours).forEach(([key, val]) => {
    if (val === 0) return;
    const pct = val / totalHours;
    const startAngle = cumulative * 2 * Math.PI;
    const endAngle = (cumulative + pct) * 2 * Math.PI;
    cumulative += pct;
    const x1 = cx + r * Math.sin(startAngle);
    const y1 = cy - r * Math.cos(startAngle);
    const x2 = cx + r * Math.sin(endAngle);
    const y2 = cy - r * Math.cos(endAngle);
    const largeArc = pct > 0.5 ? 1 : 0;
    slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${colors[key]}" stroke="#fff" stroke-width="2"/>`);
  });

  let legendHTML = '';
  Object.entries(dimHours).forEach(([key, val]) => {
    const pct = totalHours > 0 ? Math.round(val / totalHours * 100) : 0;
    legendHTML += `<div class="flex items-center gap-1"><span class="legend-dot" style="background:${colors[key]}"></span>${labels[key]}: ${val}h (${pct}%)</div>`;
  });

  return `
    <svg viewBox="0 0 180 180" width="200" height="200">
      ${slices.join('')}
      <text x="90" y="85" text-anchor="middle" font-size="18" font-weight="700" fill="var(--c-text)">${totalHours}h</text>
      <text x="90" y="102" text-anchor="middle" font-size="10" fill="var(--c-muted)">總工時</text>
    </svg>
    <div class="chart-legend">${legendHTML}</div>
  `;
}

function renderActivityEventBreakdown(events, actMap) {
  // 按活動分組工時
  const activityHours = {};
  events.forEach(e => {
    const key = e.activityId ? `act_${e.activityId}` : 'none';
    if (!activityHours[key]) activityHours[key] = { name: e.activityId ? (actMap[e.activityId] || '未知活動') : '未關聯活動', hours: 0 };
    activityHours[key].hours += (e.hours || 0);
  });
  const entries = Object.values(activityHours).sort((a,b) => b.hours - a.hours);
  if (entries.length === 0) return '<p class="text-muted text-sm">暫無活動關聯數據</p>';

  const maxH = Math.max(...entries.map(e => e.hours), 1);
  return entries.map(e => `
    <div class="bar-row">
      <div class="bar-label">${escapeHtml(e.name)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(e.hours/maxH*100)}%;background:var(--c-primary)">${e.hours}h</div>
      </div>
    </div>
  `).join('');
}

function renderEventTable(events, actMap) {
  if (events.length === 0) return '<p class="text-muted text-sm">暫無事件</p>';
  return `<table class="table"><thead><tr><th>日期</th><th>標題</th><th>分類</th><th>工時</th><th>關聯活動</th></tr></thead>
    <tbody>${events.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30).map(e => {
      const cat = MINISTRY_CATEGORIES[e.ministryCategory];
      return `<tr><td>${e.date}</td><td>${escapeHtml(e.title)}</td><td><span class="badge badge-${e.ministryCategory==='shepherd'?'shepherd':e.ministryCategory==='admin'?'admin-task':'grow'}">${cat?cat.label.slice(0,8):''}</span></td><td>${e.hours||0}h</td><td class="text-sm text-muted">${e.activityId&&actMap[e.activityId]?actMap[e.activityId]:'—'}</td></tr>`;
    }).join('')}</tbody></table>`;
}

    <div class="card"><h3 class="section-title">👥 同工名單</h3>
      <table class="table"><thead><tr><th>姓名</th><th>角色</th><th>年假額度</th><th>補假額度</th><th>操作</th></tr></thead>
        <tbody>${users.filter(u => u.role === 'staff').map(u => `<tr><td class="font-medium">${escapeHtml(u.name)}</td><td><span class="badge badge-info">同工</span></td><td>${u.annualLeave||0} 天</td><td>${u.compLeave||0} 天</td><td><button class="btn btn-outline btn-sm" onclick="editUserLeave('${u.id}')">調整額度</button></td></tr>`).join('')}</tbody></table>
    </div>
  `;
}

async function editUserLeave(userId) {
  const users = await dbGetAll('users');
  const u = users.find(x => x.id === userId);
  if (!u) return;
  showModal(`
    <h3 class="text-lg font-bold mb-3">調整假期額度 — ${escapeHtml(u.name)}</h3>
    <div class="grid grid-cols-2 gap-3 mb-4"><div><label class="label">年假天數</label><input class="input" type="number" id="annualDays" min="0" max="30" value="${u.annualLeave||0}"></div><div><label class="label">補假天數</label><input class="input" type="number" id="compDays" min="0" max="30" value="${u.compLeave||0}"></div></div>
    <div class="flex gap-2"><button class="btn btn-primary btn-block" onclick="saveUserLeave('${userId}')">儲存</button><button class="btn btn-outline" onclick="closeModal()">取消</button></div>
  `);
}

async function saveUserLeave(userId) {
  const users = await dbGetAll('users');
  const u = users.find(x => x.id === userId);
  if (!u) return;
  u.annualLeave = parseInt(document.getElementById('annualDays').value) || 0;
  u.compLeave = parseInt(document.getElementById('compDays').value) || 0;
  await dbPut('users', u);
  closeModal(); loadAdminData(); showToast(`${u.name} 的假期額度已更新 ✓`, 'success');
}

// ─── 管理員 BI 分析 (v2 新增) ───
async function renderAdminAnalytics() {
  const [events, users, activities, expenses] = await Promise.all([
    dbGetAll('events'), dbGetAll('users'), dbGetAll('activities'), dbGetAll('expenseRequests')
  ]);
  const userMap = {}; users.forEach(u => { userMap[u.id] = u.name; });
  const actMap = {}; activities.forEach(a => { actMap[a.id] = a; });
  const staffUsers = users.filter(u => u.role === 'staff');

  // 圖表一：全體同工三維度工時分佈
  const totalDim = { shepherd: 0, admin: 0, grow: 0 };
  const userDim = {}; // per-user breakdown
  events.forEach(e => {
    if (!userMap[e.userId]) return;
    if (totalDim.hasOwnProperty(e.ministryCategory)) {
      totalDim[e.ministryCategory] += (e.hours || 0);
    }
    if (!userDim[e.userId]) userDim[e.userId] = { shepherd: 0, admin: 0, grow: 0 };
    if (userDim[e.userId].hasOwnProperty(e.ministryCategory)) {
      userDim[e.userId][e.ministryCategory] += (e.hours || 0);
    }
  });
  const totalAllHours = totalDim.shepherd + totalDim.admin + totalDim.grow;

  // 圖表二：活動預算 vs 實際報銷 vs 工時
  let selectedActivity = null;
  if (APP.biActivityId) {
    selectedActivity = activities.find(a => a.id === APP.biActivityId);
  }
  if (!selectedActivity && activities.length > 0) {
    selectedActivity = activities[0];
    APP.biActivityId = selectedActivity.id;
  }

  let budgetComparisonHTML = '';
  if (selectedActivity) {
    const actExpenses = expenses.filter(e => e.activityId === selectedActivity.id && e.status === 'approved');
    const actEvents = events.filter(e => e.activityId === selectedActivity.id);
    const actualSpent = actExpenses.reduce((s, e) => s + e.amount, 0);
    const totalActHours = actEvents.reduce((s, e) => s + (e.hours || 0), 0);
    const budget = selectedActivity.budget || 0;
    const maxVal = Math.max(budget, actualSpent, 1);
    const spentPct = budget > 0 ? Math.round(actualSpent / budget * 100) : 0;

    budgetComparisonHTML = `
      <h3 class="section-title">📊 ${escapeHtml(selectedActivity.name)} — 預算與實際對比</h3>
      <div class="mini-stats mb-4">
        <div class="mini-stat"><div class="val">$${budget.toLocaleString()}</div><div class="lbl">撥款預算</div></div>
        <div class="mini-stat"><div class="val" style="color:${spentPct>100?'var(--c-danger)':'var(--c-success)'}">$${actualSpent.toLocaleString()}</div><div class="lbl">實際報銷 (${spentPct}%)</div></div>
        <div class="mini-stat"><div class="val">${totalActHours}h</div><div class="lbl">投入總工時</div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">預算</div>
        <div class="bar-track"><div class="bar-fill" style="width:100%;background:var(--c-info)">$${budget.toLocaleString()}</div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">實際報銷</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(actualSpent/maxVal*100)}%;background:${spentPct>100?'var(--c-danger)':'var(--c-success)'}">$${actualSpent.toLocaleString()} ${spentPct>100?'⚠️超支':''}</div></div>
      </div>
      <div class="bar-row mb-4">
        <div class="bar-label">投入工時</div>
        <div class="bar-track"><div class="bar-fill" style="width:${totalActHours>0?100:0}%;background:var(--c-shepherd)">${totalActHours}h</div></div>
      </div>
      <p class="text-xs text-muted mb-4">👥 參與同工：${[...new Set(actEvents.map(e=>userMap[e.userId]||'未知'))].join('、') || '無'}</p>
    `;
  }

  // 活動選擇器
  const activityOpts = activities.map(a => `<option value="${a.id}" ${APP.biActivityId===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('');

  document.getElementById('adminTabContent').innerHTML = `
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="stat-card"><div class="stat-value">${totalAllHours}h</div><div class="stat-label">全體同工總工時</div></div>
      <div class="stat-card"><div class="stat-value">${staffUsers.length}</div><div class="stat-label">活躍同工人數</div></div>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card">
        <h3 class="section-title">📊 全體事工精力分配</h3>
        <div class="mini-stats mb-4">
          <div class="mini-stat"><div class="val" style="color:var(--c-shepherd)">${totalDim.shepherd}h</div><div class="lbl">🐑 牧養工作</div></div>
          <div class="mini-stat"><div class="val" style="color:var(--c-admin)">${totalDim.admin}h</div><div class="lbl">📋 非牧養工作</div></div>
          <div class="mini-stat"><div class="val" style="color:var(--c-grow)">${totalDim.grow}h</div><div class="lbl">📚 進修與充實</div></div>
        </div>
        <div class="chart-wrap">
          ${totalAllHours > 0 ? renderPieChartSVG(totalDim, totalAllHours) : '<p class="text-muted text-sm">暫無數據</p>'}
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">👥 各同工精力分佈</h3>
        ${renderUserBarChart(userDim, userMap, staffUsers)}
      </div>
    </div>
    <div class="card mb-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="section-title" style="margin:0">📊 年度活動成效與預算對比</h3>
        <div class="flex items-center gap-2">
          <span class="text-sm text-muted">選擇活動：</span>
          <select class="select" style="width:auto" onchange="APP.biActivityId=parseInt(this.value);renderAdminAnalytics()">${activityOpts}</select>
        </div>
      </div>
      ${budgetComparisonHTML}
    </div>
  `;
}

function renderUserBarChart(userDim, userMap, staffUsers) {
  if (staffUsers.length === 0) return '<p class="text-muted text-sm">暫無同工數據</p>';
  const colors = { shepherd: 'var(--c-shepherd)', admin: 'var(--c-admin)', grow: 'var(--c-grow)' };
  let html = '';
  staffUsers.forEach(u => {
    const dim = userDim[u.id] || { shepherd: 0, admin: 0, grow: 0 };
    const total = dim.shepherd + dim.admin + dim.grow;
    if (total === 0) return;
    html += `<div class="mb-3">
      <div class="text-xs font-semibold mb-1">${escapeHtml(u.name)} (${total}h)</div>
      <div class="flex gap-1" style="height:18px;border-radius:4px;overflow:hidden">
        ${dim.shepherd>0?`<div style="width:${(dim.shepherd/total*100)}%;background:${colors.shepherd}" title="牧養 ${dim.shepherd}h"></div>`:''}
        ${dim.admin>0?`<div style="width:${(dim.admin/total*100)}%;background:${colors.admin}" title="非牧養 ${dim.admin}h"></div>`:''}
        ${dim.grow>0?`<div style="width:${(dim.grow/total*100)}%;background:${colors.grow}" title="進修 ${dim.grow}h"></div>`:''}
      </div>
    </div>`;
  });
  if (!html) return '<p class="text-muted text-sm">暫無數據</p>';
  return html + '<div class="flex gap-4 text-xs text-muted mt-2"><span>🐑 牧養</span><span>📋 非牧養</span><span>📚 進修</span></div>';
}

// ─── Tab 切換 ───
function bindTabEvents() {
  const tabContainer = APP.currentRole === 'admin' ? document.getElementById('adminTabs') : document.getElementById('staffTabs');
  if (!tabContainer) return;
  tabContainer.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tabContainer.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      APP.currentTab = btn.dataset.tab;
      if (APP.currentRole === 'staff') loadStaffData();
      else loadAdminData();
    });
  });
}

// ─── Modal ───
function showModal(html) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
}

// ─── Toast ───
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 2500);
}

// ─── 工具 ───
function daysBetween(start, end) {
  if (!start || !end) return 0;
  return Math.max(1, Math.round((new Date(end) - new Date(start)) / 86400000) + 1);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── 跨分頁同步 ───
window.addEventListener('storage', (e) => {
  if (e.key === 'ChurchAdminSync') {
    const payload = JSON.parse(e.newValue || '{}');
    if (payload.action === 'refresh') {
      console.log('[Sync] 偵測到其他分頁的數據變更');
      if (APP.currentRole) {
        if (APP.currentRole === 'staff') loadStaffData();
        else loadAdminData();
      }
      showToast('🔄 數據已從其他分頁同步', 'success');
    }
  }
});

const _dbPut = dbPut;
dbPut = async function(storeName, data) {
  const result = await _dbPut(storeName, data);
  localStorage.setItem('ChurchAdminSync', JSON.stringify({ action: 'refresh', store: storeName, ts: Date.now() }));
  setTimeout(() => localStorage.removeItem('ChurchAdminSync'), 100);
  return result;
};
const _dbDelete = dbDelete;
dbDelete = async function(storeName, id) {
  await _dbDelete(storeName, id);
  localStorage.setItem('ChurchAdminSync', JSON.stringify({ action: 'refresh', store: storeName, ts: Date.now() }));
  setTimeout(() => localStorage.removeItem('ChurchAdminSync'), 100);
};

// ─── 初始化 ───
async function init() {
  await openDB();
  await seedData();
  console.log('✅ 教會行政管理系統 v2.0.0 初始化完成');
  console.log('💡 新增：三維度工時分配 · ICS日曆匯出 · BI分析看板 · 活動財務關聯');
}
init();
</script>
