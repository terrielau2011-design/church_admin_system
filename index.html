<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教會行政管理系統 v3.4.0</title>
<style>
/* ===== Tailwind-lite Reset & Utility ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#f8fafc;--c-surface:#fff;--c-border:#e2e8f0;--c-text:#1e293b;
  --c-muted:#64748b;--c-primary:#6366f1;--c-primary-hover:#4f46e5;
  --c-success:#10b981;--c-warning:#f59e0b;--c-danger:#ef4444;
  --c-info:#3b82f6;--c-shepherd:#8b5cf6;--c-admin:#f97316;--c-grow:#06b6d4;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.6;min-height:100vh}
.flex{display:flex}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.justify-center{justify-content:center}.gap-1{gap:.25rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.gap-6{gap:1.5rem}
.grid{display:grid}.grid-cols-2{grid-template-columns:repeat(2,1fr)}.grid-cols-3{grid-template-columns:repeat(3,1fr)}.grid-cols-4{grid-template-columns:repeat(4,1fr)}
.grid-cols-5{grid-template-columns:repeat(5,1fr)}.grid-cols-6{grid-template-columns:repeat(6,1fr)}
.p-1{padding:.25rem}.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-6{padding:1.5rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}
.mb-1{margin-bottom:.25rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-6{margin-bottom:1.5rem}
.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mr-2{margin-right:.5rem}.ml-2{margin-left:.5rem}
.text-xs{font-size:.75rem}.text-sm{font-size:.875rem}.text-lg{font-size:1.125rem}.text-xl{font-size:1.25rem}.text-2xl{font-size:1.5rem}.text-3xl{font-size:1.875rem}
.font-bold{font-weight:700}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.text-center{text-align:center}.text-right{text-align:right}
.text-muted{color:var(--c-muted)}.text-primary{color:var(--c-primary)}
.text-success{color:var(--c-success)}.text-danger{color:var(--c-danger)}.text-warning{color:var(--c-warning)}
.card{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem}
.card-header{border-bottom:1px solid var(--c-border);padding-bottom:.75rem;margin-bottom:1rem}
.btn{padding:.5rem 1rem;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:.375rem}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--c-primary);color:#fff}
.btn-success{background:var(--c-success);color:#fff}
.btn-danger{background:var(--c-danger);color:#fff}
.btn-warning{background:var(--c-warning);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--c-border);color:var(--c-text)}
.btn-outline:hover{background:var(--c-bg)}
.btn-sm{padding:.3rem .65rem;font-size:.8rem}
.btn-lg{padding:.65rem 1.5rem;font-size:1rem}
.btn-block{width:100%;justify-content:center}
.badge{display:inline-block;padding:.15rem .55rem;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-muted{background:#f1f5f9;color:var(--c-muted)}
.badge-shepherd{background:#ede9fe;color:#6d28d9}
.badge-admin-task{background:#fff7ed;color:#c2410c}
.badge-grow{background:#ecfeff;color:#0e7490}
.input{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;transition:border .15s}
.input:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.select{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;background:var(--c-surface);cursor:pointer}
.textarea{width:100%;padding:.55rem .75rem;border:1.5px solid var(--c-border);border-radius:8px;font-size:.875rem;resize:vertical;min-height:70px}
.label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.25rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:.03em}
.container{max-width:1280px;margin:0 auto;padding:0 1rem}
.topbar{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:.75rem 1.5rem;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.content{padding:1.5rem}
.tab-nav{display:flex;gap:.25rem;border-bottom:2px solid var(--c-border);margin-bottom:1.5rem;flex-wrap:wrap}
.tab-btn{padding:.6rem 1rem;border:none;background:transparent;cursor:pointer;font-size:.875rem;font-weight:500;color:var(--c-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--c-text)}
.tab-btn.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:.65rem .75rem;text-align:left;border-bottom:1px solid var(--c-border);font-size:.875rem}
.table th{font-weight:600;color:var(--c-muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.03em}
.table tbody tr:hover{background:#f8fafc}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .15s}
.modal{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:1.5rem;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calendar-header{text-align:center;font-size:.75rem;font-weight:600;color:var(--c-muted);padding:.4rem 0}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .12s;position:relative}
.calendar-day:hover{background:#eef2ff}
.calendar-day.today{background:var(--c-primary);color:#fff;font-weight:700}
.calendar-day.has-event::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--c-primary)}
.calendar-day.today.has-event::after{background:#fff}
.calendar-day.other-month{color:#cbd5e1}
.toast-container{position:fixed;top:1rem;right:1rem;z-index:200;display:flex;flex-direction:column;gap:.5rem}
.toast{padding:.75rem 1.25rem;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-size:.875rem;animation:slideIn .25s;display:flex;align-items:center;gap:.5rem}
.toast-success{background:#d1fae5;color:#065f46}
.toast-error{background:#fee2e2;color:#991b1b}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.stat-card{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem 1.25rem;text-align:center}
.stat-value{font-size:2rem;font-weight:700;color:var(--c-primary)}
.stat-label{font-size:.75rem;color:var(--c-muted);margin-top:.15rem}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.login-card{background:var(--c-surface);border-radius:16px;box-shadow:var(--shadow-lg);padding:2.5rem;width:90%;max-width:420px;text-align:center}
.avatar-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;color:#fff}
.avatar-staff{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.avatar-admin{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--c-success);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hidden{display:none !important}
.progress-bar{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-success{background:var(--c-success)}
.progress-warning{background:var(--c-warning)}
.progress-danger{background:var(--c-danger)}
.section-title{font-size:1rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.filter-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.event-item{padding:.6rem .75rem;background:var(--c-bg);border-radius:8px;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem;font-size:.85rem;cursor:pointer;transition:all .12s}
.event-item:hover{background:#eef2ff}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-dot.shepherd{background:var(--c-shepherd)}
.event-dot.admin{background:var(--c-admin)}
.event-dot.grow{background:var(--c-grow)}
.cat-shepherd{color:var(--c-shepherd);font-weight:600}
.cat-admin{color:var(--c-admin);font-weight:600}
.cat-grow{color:var(--c-grow);font-weight:600}
.health-alert{padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;font-size:.875rem}
.health-alert.warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.health-alert.good{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.chart-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
.chart-legend{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-top:.75rem;font-size:.8rem}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.bar-label{width:100px;font-size:.8rem;text-align:right;flex-shrink:0;color:var(--c-muted)}
.bar-track{flex:1;height:24px;background:var(--c-bg);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;display:flex;align-items:center;padding-left:.5rem;font-size:.75rem;color:#fff;font-weight:600}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}
.mini-stat{text-align:center;padding:.5rem;background:var(--c-bg);border-radius:8px}
.mini-stat .val{font-size:1.25rem;font-weight:700}
.mini-stat .lbl{font-size:.7rem;color:var(--c-muted)}
.radio-group{display:flex;gap:.5rem;flex-wrap:wrap}
.radio-card{flex:1;min-width:100px;padding:.5rem .75rem;border:2px solid var(--c-border);border-radius:8px;cursor:pointer;text-align:center;font-size:.8rem;transition:all .15s}
.radio-card:hover{border-color:var(--c-primary)}
.radio-card.selected{border-color:var(--c-primary);background:#eef2ff}
.radio-card input{display:none}
.annual-timeline{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-bottom:1rem}
.annual-month{padding:.5rem .25rem;border-radius:6px;background:var(--c-bg);text-align:center;font-size:.7rem;min-height:60px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.annual-month:hover{border-color:var(--c-primary);background:#eef2ff}
.annual-month.has-plan{border-color:var(--c-shepherd);background:#ede9fe}
.annual-month .m-label{font-weight:700;font-size:.75rem;margin-bottom:.15rem}
.annual-month .m-count{font-size:.65rem;color:var(--c-muted)}
.quota-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.quota-item{padding:.5rem;background:var(--c-bg);border-radius:6px;text-align:center}
.quota-item .q-val{font-size:1.1rem;font-weight:700}
.quota-item .q-lbl{font-size:.65rem;color:var(--c-muted)}
/* Event detail panel */
.detail-field{background:var(--c-bg);border-radius:8px;padding:.65rem .85rem;margin-bottom:.5rem}
.detail-field .df-label{font-size:.7rem;font-weight:600;color:var(--c-muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:.15rem}
.detail-field .df-value{font-size:.85rem;color:var(--c-text)}
</style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div style="font-size:3rem;margin-bottom:.5rem">⛪</div>
    <h2 class="text-xl font-bold mb-2">教會行政管理系統</h2>
    <p class="text-muted text-sm mb-4">Church Administration System — v3.4.0</p>
    <div style="display:flex;gap:1rem;margin-bottom:1.5rem">
      <button class="btn btn-primary btn-lg" style="flex:1" onclick="login('staff')">

      <button class="btn btn-warning btn-lg" style="flex:1" onclick="login('admin')">

      </button>

<!-- ==================== MAIN APP ==================== -->
<div id="app" class="hidden">
  <div class="topbar flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span style="font-size:1.5rem">⛪</span>
      <div>
        <span class="font-bold text-lg" id="appTitle">教會行政管理系統</span>
        <span class="text-xs text-muted ml-2" id="roleBadge"></span>
      </div>
    </div>

<div class="toast-container" id="toastContainer"></div>

<script>
/* ================================================================
   教會行政管理系統 v3.4.0
   活動預算增刪查改 · 編輯保留spent · 刪除清除關聯
   ================================================================ */

// ─── 全域狀態 ───
const APP = {
  currentRole: null, currentUser: null, currentTab: 'calendar', db: null,
  biPeriod: 'month', biActivityId: null,
  planViewYear: new Date().getFullYear()
};

// ─── 常數 ───
const MINISTRY_CATEGORIES = {
  shepherd: { label: '🐑 牧養工作（給予）', color: 'var(--c-shepherd)', cls: 'cat-shepherd', dotCls: 'shepherd',
    examples: '關顧探訪、講道主日學、團契查經祈禱會等' },
  admin:    { label: '📋 非牧養工作（消耗）', color: 'var(--c-admin)', cls: 'cat-admin', dotCls: 'admin',
    examples: '內外部會議、日常行政、物資籌備等' },
  grow:     { label: '📚 進修與充實（吸收）', color: 'var(--c-grow)', cls: 'cat-grow', dotCls: 'grow',
    examples: '課程進修、退修會等' }
};

// ─── 完整 8 種假別定義 ───
const LEAVE_TYPES = {
  annual:         { label: '年假',         icon: '🏖️', trackRemaining: true,  defaultQuota: 14 },
  rest:           { label: '休假/例假',    icon: '🏠', trackRemaining: false, defaultQuota: 0 },
  compensation:   { label: '補假',         icon: '🔄', trackRemaining: true,  defaultQuota: 0 },
  sick:           { label: '病假',         icon: '🤒', trackRemaining: true,  defaultQuota: 30 },
  injury:         { label: '工傷假',       icon: '🤕', trackRemaining: false, defaultQuota: 0 },
  maternity:      { label: '產假/侍產假',  icon: '👶', trackRemaining: false, defaultQuota: 0 },
  marriage:       { label: '婚假',         icon: '💒', trackRemaining: true,  defaultQuota: 3 },
  compassionate:  { label: '喪假',         icon: '🕊️', trackRemaining: true,  defaultQuota: 3 }
};

const LEAVE_STATUS_LABELS = { pending: ['待審批','warning'], approved: ['已批准','success'], rejected: ['已拒絕','danger'] };

// ─── IndexedDB v3 ───
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('ChurchAdminDB', 3);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('events')) {
          const es = db.createObjectStore('events', { keyPath: 'id', autoIncrement: true });
          es.createIndex('userId', 'userId', { unique: false });
          es.createIndex('date', 'date', { unique: false });
        }
        if (!db.objectStoreNames.contains('leaveRequests')) {
          const ls = db.createObjectStore('leaveRequests', { keyPath: 'id', autoIncrement: true });
          ls.createIndex('userId', 'userId', { unique: false });
          ls.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('expenseRequests')) {
          const es2 = db.createObjectStore('expenseRequests', { keyPath: 'id', autoIncrement: true });
          es2.createIndex('userId', 'userId', { unique: false });
          es2.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('activities')) {
          db.createObjectStore('activities', { keyPath: 'id', autoIncrement: true });
        }
      }
      if (oldVersion < 2) {
        if (db.objectStoreNames.contains('events')) {
          const tx = e.target.transaction;
          const es = tx.objectStore('events');
          if (!es.indexNames.contains('activityId')) es.createIndex('activityId', 'activityId', { unique: false });
        }
        if (db.objectStoreNames.contains('expenseRequests')) {
          const tx2 = e.target.transaction;
          const es2 = tx2.objectStore('expenseRequests');
          if (!es2.indexNames.contains('activityId')) es2.createIndex('activityId', 'activityId', { unique: false });
        }
      }
      if (oldVersion < 3) {
        if (!db.objectStoreNames.contains('annualPlans')) {
          const aps = db.createObjectStore('annualPlans', { keyPath: 'id', autoIncrement: true });
          aps.createIndex('userId', 'userId', { unique: false });
          aps.createIndex('month', 'month', { unique: false });
          aps.createIndex('year', 'year', { unique: false });
        }
      }
    };
    req.onsuccess = (e) => { APP.db = e.target.result; resolve(APP.db); };
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = APP.db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const index = store.index(indexName);
    const req = index.getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ─── 種子數據 v3.1（含自定義欄位）───
const SEED_USERS = [
  { id: 'u1', name: '陳牧師', role: 'staff',
    leaveQuota: { annual:14, rest:0, compensation:0, sick:30, injury:0, maternity:0, marriage:3, compassionate:3 } },
  { id: 'u2', name: '李傳道', role: 'staff',
    leaveQuota: { annual:12, rest:0, compensation:2, sick:30, injury:0, maternity:0, marriage:3, compassionate:3 } },
  { id: 'u3', name: '王傳道', role: 'staff',

async function login(role) {
  APP.currentRole = role;
  const users = await dbGetAll('users');
  if (role === 'admin') {
    APP.currentUser = users.find(u => u.role === 'admin') || SEED_USERS.find(u => u.role === 'admin');
  } else {

  }
  document.getElementById('loginScreen').classList.add('hidden');

function updateTopBar() {

async function switchRole() {
  APP.currentRole = APP.currentRole === 'admin' ? 'staff' : 'admin';
  const users = await dbGetAll('users');
  if (APP.currentRole === 'admin') {
    APP.currentUser = users.find(u => u.role === 'admin');
  } else {

// ─── 日程月曆 ───
function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayHeaders = ['日','一','二','三','四','五','六'];

  let calHTML = '<div class="calendar-grid">';
  dayHeaders.forEach(d => { calHTML += `<div class="calendar-header">${d}</div>`; });
  for (let i = 0; i < firstDay; i++) calHTML += '<div class="calendar-day other-month"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === now.getDate();
    const cls = ['calendar-day'];
    if (isToday) cls.push('today');
    calHTML += `<div class="${cls.join(' ')}" data-date="${dateStr}" onclick="showDayEvents('${dateStr}')">${d}</div>`;
  }
  calHTML += '</div>';

  document.getElementById('staffTabContent').innerHTML = `
    <div class="grid grid-cols-3 gap-4">
      <div class="card" style="grid-column:span 2">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold">${year}年 ${monthNames[month]}</h3>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="exportICS()">📥 導出日曆 (.ics)</button>
            <button class="btn btn-primary btn-sm" onclick="openEventModal()">＋ 新增事件</button>
          </div>
        </div>
        ${calHTML}
        <div class="flex gap-4 mt-4 text-xs text-muted">
          <span>🐑 牧養</span><span>📋 非牧養</span><span>📚 進修</span>
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">📋 今日日程</h3>
        <div id="todayEvents"><p class="text-muted text-sm">載入中...</p></div>
        <hr style="border:none;border-top:1px solid var(--c-border);margin:1rem 0">
        <h3 class="section-title">📌 本月事件</h3>
        <div id="monthEvents"><p class="text-muted text-sm">載入中...</p></div>
      </div>
    </div>
  `;
  loadCalendarEvents(year, month);
}

async function loadCalendarEvents(year, month) {
  const events = await dbGetByIndex('events', 'userId', APP.currentUser.id);
  const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthEvents = events.filter(e => e.date.startsWith(monthPrefix));
  const eventDates = new Set(monthEvents.map(e => e.date));
  document.querySelectorAll('.calendar-day[data-date]').forEach(el => {
    if (eventDates.has(el.dataset.date)) el.classList.add('has-event');
  });
  const today = `${year}-${String(month+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
  const todayEvents = events.filter(e => e.date === today);
  const todayEl = document.getElementById('todayEvents');
  if (todayEvents.length === 0) {
    todayEl.innerHTML = '<p class="text-muted text-sm">今日暫無安排</p>';
  } else {
    todayEl.innerHTML = todayEvents.map(e => {
      const cat = MINISTRY_CATEGORIES[e.ministryCategory];
      return `<div class="event-item" onclick="showEventDetail(${e.id})">
        <span class="event-dot ${cat ? cat.dotCls : ''}"></span>
        <span style="flex:1">${e.title}</span>
        <span class="text-xs ${cat ? cat.cls : ''}">${cat ? cat.label.slice(0,4) : ''} ${e.hours||0}h</span>
      </div>`;
    }).join('');
  }
  const monthEl = document.getElementById('monthEvents');
  if (monthEvents.length === 0) {
    monthEl.innerHTML = '<p class="text-muted text-sm">本月暫無事件</p>';
  } else {
    monthEl.innerHTML = monthEvents.sort((a,b) => a.date.localeCompare(b.date)).map(e => {
      const cat = MINISTRY_CATEGORIES[e.ministryCategory];
      return `<div class="event-item" onclick="showEventDetail(${e.id})">
        <span class="event-dot ${cat ? cat.dotCls : ''}"></span>
        <span style="flex:1">${e.title}</span>
        <span class="text-xs text-muted">${e.date.slice(5)} ${cat ? cat.label.slice(0,4) : ''}</span>
      </div>`;
    }).join('');
  }
}

// 生成標題下拉 HTML
function renderTitleSelectHTML(cat, currentTitle) {
  const subtypes = MINISTRY_SUBTYPES[cat] || [];
  const isPreset = subtypes.some(s => s.value === currentTitle);
  let html = `<select class="select" id="eventTitleSelect" onchange="onTitleSelectChange('${cat}')">`;
  html += `<option value="">— 請選擇事工細分 —</option>`;
  subtypes.forEach(s => {
    html += `<option value="${s.value}" ${currentTitle === s.value ? 'selected' : ''}>${s.label}</option>`;
  });
  html += `<option value="__custom__" ${(!isPreset && currentTitle) ? 'selected' : ''}>📝 其他（自行填寫）</option>`;
  html += `</select>`;
  return html;
}

function onTitleSelectChange(cat) {
  const sel = document.getElementById('eventTitleSelect');
  const customWrap = document.getElementById('customTitleWrap');
  const customInput = document.getElementById('eventTitleCustom');
  if (sel && customWrap && customInput) {
    if (sel.value === '__custom__') {
      customWrap.classList.remove('hidden');
      customInput.focus();
    } else {
      customWrap.classList.add('hidden');
    }
  }
}

// 取得目前事件標題值（從下拉或自定義）
function getEventTitleValue() {
  const sel = document.getElementById('eventTitleSelect');
  if (sel && sel.value && sel.value !== '__custom__') {
    return sel.value;
  }
  const customInput = document.getElementById('eventTitleCustom');
  if (customInput) return customInput.value.trim();
  return '';
}

// ─── ICS 匯出 (v3.1: 含自定義欄位) ───
async function exportICS() {
  const events = await dbGetByIndex('events', 'userId', APP.currentUser.id);
  if (events.length === 0) { showToast('沒有可匯出的事件', 'error'); return; }
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//ChurchAdmin//CN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
  events.forEach(e => {
    const dtStart = e.date.replace(/-/g,'') + 'T' + (e.time||'000000').replace(/:/g,'') + '00';
    const dtEnd = e.date.replace(/-/g,'') + 'T' + (e.time||'000000').replace(/:/g,'') + '00';
    const cat = MINISTRY_CATEGORIES[e.ministryCategory];
    let desc = '工時 ' + (e.hours||0) + 'h | 分類 ' + (e.ministryCategory||'');
    if (e.participants) desc += ' | 參與者: ' + e.participants;
    if (e.location) desc += ' | 地點: ' + e.location;
    if (e.followUp) desc += ' | 跟進: ' + e.followUp;
    ics += 'BEGIN:VEVENT\r\nDTSTART:' + dtStart + '\r\nDTEND:' + dtEnd + '\r\nSUMMARY:' + (cat?cat.label.slice(0,4):'') + ' ' + e.title + '\r\nDESCRIPTION:' + desc + '\r\nLOCATION:' + (e.location||'') + '\r\nEND:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = 'church-calendar-' + APP.currentUser.name + '.ics'; a.click(); URL.revokeObjectURL(url);
  showToast('📥 日曆已導出，可匯入 Outlook/Google/Apple Calendar', 'success');
}

async function renderAnnualPlan() {

  document.getElementById('staffTabContent').innerHTML = `

async function renderLeave() {
  const userData = await getUserData(APP.currentUser.id);
  if (!userData) return;
  const quota = userData.leaveQuota || {};
  const leaves = await dbGetByIndex('leaveRequests', 'userId', APP.currentUser.id);
  const used = {};
  for (const k of Object.keys(LEAVE_TYPES)) used[k] = 0;
  leaves.filter(l => l.status === 'approved').forEach(l => {
    const days = daysBetween(l.startDate, l.endDate);
    if (used.hasOwnProperty(l.type)) used[l.type] += days;
  });
  const trackableTypes = Object.entries(LEAVE_TYPES).filter(([k,v]) => v.trackRemaining);
  let quotaCards = '';
  trackableTypes.forEach(([key, val]) => {
    const remain = Math.max(0, (quota[key] || val.defaultQuota) - (used[key] || 0));
    const total = quota[key] || val.defaultQuota;
    quotaCards += `<div class="quota-item"><div class="q-val">${remain}</div><div class="q-lbl">${val.icon} ${val.label}<br><span class="text-xs">(共${total}天)</span></div><div class="progress-bar mt-1"><div class="progress-fill progress-${remain>total*0.3?'success':'warning'}" style="width:${total>0?(remain/total*100):0}%"></div></div></div>`;
  });
  const leaveTypeOpts = Object.entries(LEAVE_TYPES).map(([k,v]) => `<option value="${k}">${v.icon} ${v.label}</option>`).join('');

  document.getElementById('staffTabContent').innerHTML = `
    <div class="card mb-4"><h3 class="section-title">📊 假期餘額總覽</h3><div class="quota-grid">${quotaCards}</div></div>
    <div class="grid grid-cols-3 gap-4">
      <div class="card" style="grid-column:span 2"><h3 class="section-title">📋 請假記錄</h3>${renderLeaveListV3(leaves)}</div>
      <div class="card"><h3 class="section-title">✍️ 申請假期</h3>
        <form onsubmit="submitLeaveV3(event)" style="display:flex;flex-direction:column;gap:.75rem">
          <div><label class="label">假期類型</label><select class="select" id="leaveType" required>${leaveTypeOpts}</select></div>
          <div class="grid grid-cols-2 gap-3"><div><label class="label">開始日期</label><input class="input" type="date" id="leaveStart" required></div><div><label class="label">結束日期</label><input class="input" type="date" id="leaveEnd" required></div></div>
          <div><label class="label">原因</label><textarea class="textarea" id="leaveReason" placeholder="請簡述請假原因..."></textarea></div>
          <button class="btn btn-primary btn-block" type="submit">📤 提交申請</button>
        </form>
      </div>
    </div>
  `;
}

function renderLeaveListV3(leaves) {
  if (leaves.length === 0) return '<p class="text-muted text-sm">暫無請假記錄</p>';
  return `<table class="table"><thead><tr><th>類型</th><th>日期</th><th>天數</th><th>原因</th><th>狀態</th></tr></thead><tbody>${leaves.sort((a,b)=>b.createdAt-a.createdAt).map(l=>{const lt=LEAVE_TYPES[l.type]||{label:l.type,icon:'📋'};const st=LEAVE_STATUS_LABELS[l.status]||['未知','muted'];return`<tr><td>${lt.icon} ${lt.label}</td><td>${l.startDate} 至 ${l.endDate}</td><td>${daysBetween(l.startDate,l.endDate)}天</td><td>${escapeHtml(l.reason||'')}</td><td><span class="badge badge-${st[1]}">${st[0]}</span></td></tr>`;}).join('')}</tbody></table>`;
}

async function submitLeaveV3(e) {
  e.preventDefault();
  const type = document.getElementById('leaveType').value;
  const startDate = document.getElementById('leaveStart').value;
  const endDate = document.getElementById('leaveEnd').value;
  const reason = document.getElementById('leaveReason').value.trim();
  if (!startDate || !endDate) { showToast('請選擇日期', 'error'); return; }
  if (startDate > endDate) { showToast('結束日期不可早於開始日期', 'error'); return; }
  await dbPut('leaveRequests', { userId: APP.currentUser.id, type, startDate, endDate, reason, status: 'pending', createdAt: Date.now() });
  renderLeave(); showToast('假期申請已提交 ✓', 'success');
}

async function submitExpense(e) {

async function renderStaffAnalytics() {
  const [events, activities] = await Promise.all([dbGetByIndex('events', 'userId', APP.currentUser.id), dbGetAll('activities')]);
  const actMap = {}; activities.forEach(a => { actMap[a.id] = a.name; });
  const now = new Date();
  let periodStart;
  if (APP.biPeriod === 'month') periodStart = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (APP.biPeriod === 'quarter') { const q = Math.floor(now.getMonth()/3); periodStart = new Date(now.getFullYear(), q*3, 1); }
  else periodStart = new Date(now.getFullYear(), 0, 1);
  const periodEvents = events.filter(e => new Date(e.date) >= periodStart);
  const dimHours = { shepherd:0, admin:0, grow:0 };
  periodEvents.forEach(e => { if (dimHours.hasOwnProperty(e.ministryCategory)) dimHours[e.ministryCategory] += (e.hours||0); });
  const totalHours = dimHours.shepherd + dimHours.admin + dimHours.grow;
  let healthMsg='', healthClass='';
  if (totalHours===0) { healthMsg='📭 本週期暫無工作記錄。請開始填寫日程以獲得健康度分析。'; healthClass='warn'; }
  else {
    const adminPct=dimHours.admin/totalHours, growPct=dimHours.grow/totalHours;
    if (adminPct>0.5) { healthMsg='⚠️ 非牧養行政工作佔比超過 50%，請留意是否過度消耗精力，建議適度調整並增加進修時間。'; healthClass='warn'; }
    else if (growPct===0 && totalHours>10) { healthMsg='💡 本週期暫無進修記錄。持續學習是服侍長遠的根基，建議安排退修或進修時間。'; healthClass='warn'; }
    else if (dimHours.shepherd>=dimHours.admin && growPct>0.05) { healthMsg='✅ 事工焦點分配均衡！牧養為主、行政為輔、持續進修，保持健康節奏。'; healthClass='good'; }
    else { healthMsg='💡 事工分配大致合理，建議持續關注進修與充實的比例。'; healthClass='good'; }
  }
  const periodLabel = APP.biPeriod==='month'?'本月':APP.biPeriod==='quarter'?'本季':'本年';
  document.getElementById('staffTabContent').innerHTML = `
    <div class="health-alert ${healthClass}"><span style="font-size:1.25rem">${healthClass==='good'?'✅':'⚠️'}</span><span>${healthMsg}</span></div>
    <div class="filter-row mb-4">
      <span class="text-sm text-muted">分析週期：</span>
      <button class="btn btn-sm ${APP.biPeriod==='month'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='month';renderStaffAnalytics()">本月</button>
      <button class="btn btn-sm ${APP.biPeriod==='quarter'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='quarter';renderStaffAnalytics()">本季</button>
      <button class="btn btn-sm ${APP.biPeriod==='year'?'btn-primary':'btn-outline'}" onclick="APP.biPeriod='year';renderStaffAnalytics()">本年</button>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card"><h3 class="section-title">📊 ${periodLabel}三維度工時分佈</h3>
        <div class="mini-stats mb-4"><div class="mini-stat"><div class="val" style="color:var(--c-shepherd)">${dimHours.shepherd}h</div><div class="lbl">🐑 牧養工作</div></div><div class="mini-stat"><div class="val" style="color:var(--c-admin)">${dimHours.admin}h</div><div class="lbl">📋 非牧養工作</div></div><div class="mini-stat"><div class="val" style="color:var(--c-grow)">${dimHours.grow}h</div><div class="lbl">📚 進修與充實</div></div></div>
        <div class="chart-wrap">${totalHours>0?renderPieChartSVG(dimHours,totalHours):'<p class="text-muted text-sm">暫無數據</p>'}</div>
      </div>
      <div class="card"><h3 class="section-title">📅 ${periodLabel}活動參與工時</h3>${renderActivityEventBreakdown(periodEvents,actMap)}</div>
    </div>
    <div class="card"><h3 class="section-title">📋 ${periodLabel}事件明細</h3>${renderEventTable(periodEvents,actMap)}</div>
  `;
}

function renderPieChartSVG(dimHours, totalHours) {
  const colors = { shepherd:'var(--c-shepherd)', admin:'var(--c-admin)', grow:'var(--c-grow)' };
  const labels = { shepherd:'牧養工作', admin:'非牧養工作', grow:'進修與充實' };
  const slices=[]; let cumulative=0; const cx=90,cy=90,r=70;
  Object.entries(dimHours).forEach(([key,val])=>{if(val===0)return;const pct=val/totalHours;const sa=cumulative*2*Math.PI;const ea=(cumulative+pct)*2*Math.PI;cumulative+=pct;const x1=cx+r*Math.sin(sa),y1=cy-r*Math.cos(sa),x2=cx+r*Math.sin(ea),y2=cy-r*Math.cos(ea);const la=pct>0.5?1:0;slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la} 1 ${x2},${y2} Z" fill="${colors[key]}" stroke="#fff" stroke-width="2"/>`);});
  let legendHTML='';Object.entries(dimHours).forEach(([key,val])=>{const pct=totalHours>0?Math.round(val/totalHours*100):0;legendHTML+=`<div class="flex items-center gap-1"><span class="legend-dot" style="background:${colors[key]}"></span>${labels[key]}: ${val}h (${pct}%)</div>`;});
  return `<svg viewBox="0 0 180 180" width="200" height="200">${slices.join('')}<text x="90" y="85" text-anchor="middle" font-size="18" font-weight="700" fill="var(--c-text)">${totalHours}h</text><text x="90" y="102" text-anchor="middle" font-size="10" fill="var(--c-muted)">總工時</text></svg><div class="chart-legend">${legendHTML}</div>`;
}

function renderActivityEventBreakdown(events, actMap) {
  const ah={};events.forEach(e=>{const key=e.activityId?'act_'+e.activityId:'none';if(!ah[key])ah[key]={name:e.activityId?(actMap[e.activityId]||'未知活動'):'未關聯活動',hours:0};ah[key].hours+=(e.hours||0);});
  const entries=Object.values(ah).sort((a,b)=>b.hours-a.hours);
  if(entries.length===0)return'<p class="text-muted text-sm">暫無活動關聯數據</p>';
  const maxH=Math.max(...entries.map(e=>e.hours),1);
  return entries.map(e=>`<div class="bar-row"><div class="bar-label">${escapeHtml(e.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${(e.hours/maxH*100)}%;background:var(--c-primary)">${e.hours}h</div></div></div>`).join('');
}

function renderEventTable(events, actMap) {
  if(events.length===0)return'<p class="text-muted text-sm">暫無事件</p>';
  return `<table class="table"><thead><tr><th>日期</th><th>標題</th><th>分類</th><th>工時</th><th>參與對象</th><th>關聯活動</th></tr></thead><tbody>${events.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30).map(e=>{const cat=MINISTRY_CATEGORIES[e.ministryCategory];return`<tr><td>${e.date}</td><td>${escapeHtml(e.title)}</td><td><span class="badge badge-${e.ministryCategory==='shepherd'?'shepherd':e.ministryCategory==='admin'?'admin-task':'grow'}">${cat?cat.label.slice(0,8):''}</span></td><td>${e.hours||0}h</td><td class="text-sm text-muted">${e.participants||'—'}</td><td class="text-sm text-muted">${e.activityId&&actMap[e.activityId]?actMap[e.activityId]:'—'}</td></tr>`;}).join('')}</tbody></table>`;
}

  `;
}

async function approveLeave(id) {
  // 獲取請假記錄
  const allLeaves = await dbGetAll('leaveRequests');
  const leaveReq = allLeaves.find(l => l.id === id);
  if (!leaveReq || leaveReq.status !== 'pending') return;

  // 計算天數
  const days = daysBetween(leaveReq.startDate, leaveReq.endDate);

  // 扣減員工假期額度（僅追蹤型假別）
  const leaveDef = LEAVE_TYPES[leaveReq.type];
  if (leaveDef && leaveDef.trackRemaining) {
    const users = await dbGetAll('users');
    const user = users.find(u => u.id === leaveReq.userId);
    if (user) {
      if (!user.leaveQuota) user.leaveQuota = {};
      if (user.leaveQuota[leaveReq.type] === undefined) {
        user.leaveQuota[leaveReq.type] = leaveDef.defaultQuota;
      }
      user.leaveQuota[leaveReq.type] = Math.max(0, (user.leaveQuota[leaveReq.type] || 0) - days);
      await dbPut('users', user);
    }
  }

  // 更新狀態
  leaveReq.status = 'approved';
  await dbPut('leaveRequests', leaveReq);
  loadAdminData();
  showToast(`假期已批准 ✓ (已扣減 ${leaveDef ? leaveDef.label : ''} ${days} 天)`, 'success');
}

async function rejectLeave(id) {
  const allLeaves = await dbGetAll('leaveRequests');
  const leaveReq = allLeaves.find(l => l.id === id);
  if (!leaveReq) return;
  leaveReq.status = 'rejected';
  await dbPut('leaveRequests', leaveReq);
  loadAdminData();
  showToast('假期已拒絕', 'success');
}

async function approveExpense(id) {
  // 獲取報銷記錄
  const allExpenses = await dbGetAll('expenseRequests');
  const exp = allExpenses.find(e => e.id === id);
  if (!exp || exp.status !== 'pending') return;

  // 如果關聯了活動，扣減活動剩餘預算
  if (exp.activityId) {
    const activities = await dbGetAll('activities');
    const act = activities.find(a => a.id === exp.activityId);
    if (act) {
      if (act.spent === undefined) act.spent = 0;
      act.spent += exp.amount;
      await dbPut('activities', act);
    }
  }

  // 更新狀態
  exp.status = 'approved';
  await dbPut('expenseRequests', exp);
  loadAdminData();
  showToast(`報銷已批准 ✓ $${exp.amount.toFixed(2)}`, 'success');
}

async function rejectExpense(id) {
  const allExpenses = await dbGetAll('expenseRequests');
  const exp = allExpenses.find(e => e.id === id);
  if (!exp) return;
  exp.status = 'rejected';
  await dbPut('expenseRequests', exp);
  loadAdminData();
  showToast('報銷已拒絕', 'success');
}

// ─── 活動詳情 Modal：同工支出貢獻明細 ───
async function showActivityDetail(actId) {
  const [activities, expenses, users] = await Promise.all([
    dbGetAll('activities'), dbGetAll('expenseRequests'), dbGetAll('users')
  ]);
  const act = activities.find(a => a.id === actId);
  if (!act) return;

  const userMap = {}; users.forEach(u => { userMap[u.id] = u; });
  const actExpenses = expenses.filter(e => e.activityId === actId && e.status === 'approved');

  // 按同工分組
  const userSpending = {};
  actExpenses.forEach(e => {
    const name = userMap[e.userId] ? userMap[e.userId].name : '未知';
    if (!userSpending[name]) userSpending[name] = { total: 0, items: [] };
    userSpending[name].total += e.amount;
    userSpending[name].items.push(e);
  });

  const budget = act.budget || 0;
  const spent = act.spent || 0;
  const remain = budget - spent;
  const pct = budget > 0 ? Math.round(spent / budget * 100) : 0;
  const catLabels = { travel:'差旅交通', stationery:'文具用品', meal:'聚餐', custom:'自定義' };

  let detailRows = '';
  let barHTML = '';
  const maxSpent = Math.max(...Object.values(userSpending).map(u => u.total), 1);

  if (Object.keys(userSpending).length === 0) {
    detailRows = '<tr><td colspan="4" class="text-center text-muted">暫無已批准報銷記錄</td></tr>';
  } else {
    Object.entries(userSpending).sort((a,b) => b[1].total - a[1].total).forEach(([name, data]) => {
      // 長條圖
      barHTML += `<div class="bar-row">
        <div class="bar-label">${escapeHtml(name)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(data.total/maxSpent*100)}%;background:var(--c-primary)">$${data.total.toLocaleString()}</div>
        </div>
      </div>`;

      // 明細表
      data.items.forEach(e => {
        detailRows += `<tr>
          <td class="font-medium">${escapeHtml(name)}</td>
          <td>${catLabels[e.category]||e.category}</td>
          <td class="font-semibold">$${e.amount.toFixed(2)}</td>
          <td class="text-sm text-muted">${escapeHtml(e.description||'')}</td>
        </tr>`;
      });
    });
  }

  showModal(`
    <h3 class="text-lg font-bold mb-3">📊 ${escapeHtml(act.name)} — 支出明細</h3>

    <div class="grid grid-cols-3 gap-2 mb-4">
      <div class="detail-field text-center">
        <div class="df-label">撥款預算</div>
        <div class="df-value font-bold text-lg">$${budget.toLocaleString()}</div>
      </div>
      <div class="detail-field text-center">
        <div class="df-label">已批報銷</div>
        <div class="df-value font-bold text-lg" style="color:${pct>100?'var(--c-danger)':'var(--c-success)'}">$${spent.toLocaleString()}</div>
      </div>
      <div class="detail-field text-center">
        <div class="df-label">剩餘預算</div>
        <div class="df-value font-bold text-lg" style="color:${remain<0?'var(--c-danger)':'var(--c-success)'}">$${remain.toLocaleString()}</div>
      </div>
    </div>

    <div class="progress-bar mb-4" style="height:10px">
      <div class="progress-fill progress-${pct>100?'danger':pct>80?'warning':'success'}" style="width:${Math.min(pct,100)}%"></div>
    </div>
    <p class="text-xs text-muted mb-4">預算使用率：${pct}% ${pct>100?'⚠️ 超支':''}</p>

    <h3 class="section-title">👥 同工支出貢獻明細</h3>
    ${barHTML ? `<div class="mb-3">${barHTML}</div>` : '<p class="text-muted text-sm mb-3">暫無數據</p>'}

    <table class="table">
      <thead><tr><th>同工</th><th>類別</th><th>金額</th><th>描述</th></tr></thead>
      <tbody>${detailRows}</tbody>
    </table>

    <button class="btn btn-outline mt-4 btn-block" onclick="closeModal()">關閉</button>
  `);
}

async function updateActivity(id){
  const name=document.getElementById('actName').value.trim();

async function deleteActivity(id){
  // 清除所有關聯此活動的 events 中的 activityId
  const events=await dbGetAll('events');
  for(const ev of events){
    if(ev.activityId===id){
      ev.activityId=null;
      await dbPut('events',ev);
    }
  }
  // 清除所有關聯此活動的 expenseRequests 中的 activityId
  const expenses=await dbGetAll('expenseRequests');
  for(const exp of expenses){
    if(exp.activityId===id){
      exp.activityId=null;
      await dbPut('expenseRequests',exp);
    }
  }
  // 刪除活動本身
  await dbDelete('activities',id);
  closeModal();loadAdminData();showToast('活動已刪除，關聯數據已清除 ✓','success');
}

async function saveUserLeaveAll(userId) {
  const users = await dbGetAll('users');

  if (!u.leaveQuota) u.leaveQuota = {};

function renderUserBarChart(userDim, userMap, staffUsers) {
  if(staffUsers.length===0)return'<p class="text-muted text-sm">暫無同工數據</p>';

// ─── Modal & Toast ───
function showModal(html) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() { const overlay = document.querySelector('.modal-overlay'); if (overlay) overlay.remove(); }
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 2500);
}

  await _dbDelete(storeName, id);
  localStorage.setItem('ChurchAdminSync', JSON.stringify({ action: 'refresh', store: storeName, ts: Date.now() }));
  setTimeout(() => localStorage.removeItem('ChurchAdminSync'), 100);
};
